services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # pg_isready confirma que el server acepta conexiones. Sin esto, el
    # backend intenta conectar mientras postgres aún corre su
    # post-bootstrap y aborta el lifespan.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # Leemos la etapa (development o production) desde la variable
      target: ${APP_ENV:-development}
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${APP_ENV:-development}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DEMO_SEED_MEDICO=${DEMO_SEED_MEDICO:-9db9d1d61b50478427b5445406099d04c79cbdbf722d6e3cc97165058ef523c9}
      - DEMO_SEED_FARMACEUTICO=${DEMO_SEED_FARMACEUTICO:-4e97b3668f15e819fc25c7a449041144684b47238663cdefdc81844c4b51ac50}
      - DEMO_SEED_PACIENTE=${DEMO_SEED_PACIENTE:-338467a8a8700b0c5c26ba38e82a9d366bf9fc7fed71ffe3aa0730ec5a9a96e3}
      # Lista separada por comas de orígenes autorizados por CORS.
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:4321,http://127.0.0.1:4321}
    volumes:
      - ./backend:/app:Z
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Leemos la etapa (development o production) desde la variable
      target: ${APP_ENV:-development}
    ports:
      # Mapeamos el puerto externo al interno. 
      # Usamos variables para cambiarlo según el entorno (ej. 4321 en dev, 80 en prod)
      - "${FRONTEND_PORT:-4321}:${FRONTEND_INTERNAL_PORT:-4321}"
    environment:
      # URL pública del backend que usa el cliente Astro (fetch desde el navegador).
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app:Z
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
      

volumes:
  postgres_data:
  frontend_node_modules: