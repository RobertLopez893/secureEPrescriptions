services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # Leemos la etapa (development o production) desde la variable
      target: ${APP_ENV:-development}
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${APP_ENV:-development}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./backend:/app:Z
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Leemos la etapa (development o production) desde la variable
      target: ${APP_ENV:-development}
    ports:
      # Mapeamos el puerto externo al interno. 
      # Usamos variables para cambiarlo según el entorno (ej. 4321 en dev, 80 en prod)
      - "${FRONTEND_PORT:-4321}:${FRONTEND_INTERNAL_PORT:-4321}"
    volumes:
      - ./frontend:/app:Z
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
      

volumes:
  postgres_data:
  frontend_node_modules: