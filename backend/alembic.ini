# Configuración de Alembic para el backend de Secure E-Prescriptions.
# La URL de conexión NO se pone aquí: env.py la toma de DATABASE_URL
# (mismo origen que la app) con fallback a sqlite local.
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# Nombre de archivo de revisión legible: 0001_xxx, 0002_xxx, ...
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
